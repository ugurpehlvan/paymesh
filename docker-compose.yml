services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: paymesh
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "3000:3000"
    depends_on:
      - user-service

  user-service:
    build: ./services/user-service
    ports:
      - "3001:3000"

  wallet-service:
    build: ./services/wallet-service
    ports:
      - "3002:3000"